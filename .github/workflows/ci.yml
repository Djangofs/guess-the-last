name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Format check
        run: npx nx format:check

      - name: Lint
        run: npx nx affected -t lint

      - name: Typecheck
        run: npx nx affected -t typecheck

      - name: Unit tests
        run: npx nx affected -t test

      - name: Build
        run: npx nx affected -t build

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gtlp_user
          POSTGRES_PASSWORD: gtlp_pass
          POSTGRES_DB: guess_the_last_pokemon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Integration tests
        run: npx nx affected -t integration-test
        env:
          DATABASE_URL: postgresql://gtlp_user:gtlp_pass@localhost:5432/guess_the_last_pokemon
